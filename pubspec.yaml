name: portfolio
description: A modern Flutter web portfolio.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.4.0

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0

  # Local storage
  shared_preferences: ^2.3.2

  # Web URL strategy
  url_strategy: ^0.2.0

  # UI / fonts
  google_fonts: ^6.2.1

  # Generated assets
  flutter_gen: ^5.6.0

  # Effects
  shimmer: ^3.0.0

  # Image caching
  cached_network_image: ^3.4.1

  # Icons
  cupertino_icons: ^1.0.8
  gap: ^3.0.1
  pinput: ^6.0.2
  reactive_forms: ^17.0.0
  reactive_forms_annotations: ^7.0.0
  hooks_riverpod: ^2.6.1
  video_player: ^2.9.2
  chewie: ^1.8.5
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.0
  video_thumbnail: ^0.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_gen_runner: ^5.6.0
  reactive_forms_generator: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/videos/
    - assets/images_baby/

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: false
  assets:
    enabled: true

